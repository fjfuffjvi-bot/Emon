<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMON | Cyber Zone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Courier New", monospace;
}

body{
    height:100vh;
    background:#000;
    color:#00ff99;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    border:1px solid #00ff99;
    padding:40px;
    width:90%;
    max-width:600px;
    box-shadow:0 0 30px #00ff99;
    background:rgba(0,0,0,0.8);
}

h1{
    font-size:60px;
    letter-spacing:10px;
    text-shadow:0 0 20px #00ff99;
}

p{
    margin:20px 0;
    font-size:18px;
}

button{
    background:transparent;
    color:#00ff99;
    border:2px solid #00ff99;
    padding:12px 30px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

button:hover{
    background:#00ff99;
    color:#000;
    box-shadow:0 0 20px #00ff99;
}

/* Matrix effect */
.matrix{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    background:
    linear-gradient(90deg, rgba(0,255,100,.1) 1px, transparent 1px),
    linear-gradient(rgba(0,255,100,.1) 1px, transparent 1px);
    background-size:20px 20px;
    animation:move 5s linear infinite;
}

@keyframes move{
    from{transform:translateY(0);}
    to{transform:translateY(20px);}
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

</style>
</head>

<body>

<div class="matrix"></div>

<div class="container">
    <h1>EMON</h1>

    <p>
    > Welcome to Cyber Zone_<span class="cursor">|</span>
    </p>

    <p>
    Digital • Code • Technology
    </p>

    <button>ENTER</button>
</div>

</body>
</html>
